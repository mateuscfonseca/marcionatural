services:
  backend:
    build: ./back
    container_name: marcionatural-backend
    volumes:
      - sqlite_data:/app/data
      - uploads_data:/app/uploads/images
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      - marcionatural-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build: ./app
    container_name: marcionatural-frontend
    ports:
      - "9000:80"
    depends_on:
      - backend
    networks:
      - marcionatural-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  sqlite_data:
    driver: local
  uploads_data:
    driver: local

networks:
  marcionatural-network:
    driver: bridge
